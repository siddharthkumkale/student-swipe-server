name: student_swipe
description: "Student Swipe - Connect with students through skill-based swiping."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.6.5
  google_sign_in: ^6.3.0

  # Image picker
  image_picker: ^1.0.7

  # Tinder swipe cards
  flutter_card_swiper: ^6.0.0

  # UI helpers
  google_fonts: ^6.1.0

  # State management
  provider: ^6.1.1

  # UUID generator
  uuid: ^4.3.3

  # Local preferences
  shared_preferences: ^2.2.2

  # HTTP (AI bot bridge → Render)
  http: ^1.2.2

  # Cached images
  cached_network_image: ^3.3.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.1.0
  image: ^4.8.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_main.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/logo_main.png"